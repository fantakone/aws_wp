version: 0.2

phases:
install:
    commands:
      # Install kubectl
      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
      - kubectl version --client  # Confirm kubectl installation
build:
    commands:
      - kubectl get pods --namespace default | grep wordpress
      - kubectl exec -it $(kubectl get pods -n default -l app.kubernetes.io/name=wordpress -o jsonpath='{.items[0].metadata.name}') -- curl -I http://localhost:8080/wp-login.php

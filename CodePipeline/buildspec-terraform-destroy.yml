version: 0.2

phases:
install:
    commands:
      # Install Terraform
      - echo "Installing Terraform..."
      - rm -rf terraform  # Remove any existing directory named 'terraform'
      - curl -O https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip
      - unzip terraform_1.7.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version  # Confirm Terraform installation
build:
    commands:
      - cd tf/environments/test
      - terraform init
      - terraform destroy -auto-approve
artifacts:
  files:
    - '**/*'

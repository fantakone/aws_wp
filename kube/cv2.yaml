# Configuration de l'image
image:
  repository: 654654192380.dkr.ecr.eu-west-3.amazonaws.com/webservice-ecr
  tag: "latest"
  pullPolicy: Always

# Configuration du service
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-name: "wordpress-lb"
    service.beta.kubernetes.io/aws-load-balancer-type: "external"

# Configuration de l'ingress
ingress:
  enabled: false

# Configuration de la persistance
persistence:
  enabled: true
  storageClass: "gp2"
  accessMode: ReadWriteOnce
  size: 10Gi
  plugins:
    enabled: true
    storageClass: "gp2"
    accessMode: ReadWriteOnce
    size: 5Gi
  themes:
    enabled: true
    storageClass: "gp2"
    accessMode: ReadWriteOnce
    size: 5Gi

# Configuration des ressources
resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

# Configuration de la base de données externe
externalDatabase:
  host: webservice-aurora-cluster.cluster-cvwmo8w6u1ab.eu-west-3.rds.amazonaws.com
  user: root
  password: rootroot
  database: wordpress_db
  port: 3306

# Configuration du cache externe
externalCache:
  host: webservice-cache.epyysj.cfg.euw3.cache.amazonaws.com
  port: 11211

# Configuration WordPress
wordpressUsername: user
wordpressPassword: "${WORDPRESS_PASSWORD}"
wordpressEmail: user@example.com
wordpressBlogName: "My WordPress Blog"

# Configuration WordPress supplémentaire
wordpressExtraConfigContent: |
  define('MYSQL_CLIENT_FLAGS', MYSQLI_CLIENT_SSL_DONT_VERIFY_SERVER_CERT);
  define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
  define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);

# Nombre de réplicas
replicaCount: 1

# Configuration des sondes de vivacité et de préparation
livenessProbe:
  httpGet:
    path: /wp-login.php
    port: 8080
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /wp-login.php
    port: 8080
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

# Configuration de l'autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Configuration du compte de service
serviceAccount:
  create: true
  automount: true

# Configuration Apache
apache:
  port: 8080

# Désactiver MariaDB interne
mariadb:
  enabled: false

# Configuration de sécurité
podSecurityContext:
  fsGroup: 33

securityContext:
  runAsUser: 33
  runAsNonRoot: true

# Configuration des mises à jour
updateStrategy:
  type: RollingUpdate

# Configuration des variables d'environnement
extraEnvVars:
  - name: WORDPRESS_CONFIG_EXTRA
    value: |
      define('WP_SITEURL', 'http://' . $_SERVER['HTTP_HOST']);
      define('WP_HOME', 'http://' . $_SERVER['HTTP_HOST']);
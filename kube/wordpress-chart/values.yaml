image:
  repository: 654654192380.dkr.ecr.eu-west-3.amazonaws.com/webservice-ecr
  tag: "latest"
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80

ingress:
  enabled: true
  hosts:
    - host: wordpress.example.com
      paths: 
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  storageClass: "gp2"
  accessMode: ReadWriteOnce
  size: 10Gi

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

externalDatabase:
  host: webservice-aurora-cluster.cluster-cvwmo8w6u1ab.eu-west-3.rds.amazonaws.com
  user: root
  password: rootroot
  database: wordpress_db
  port: 3306

externalCache:
  host: webservice-cache.epyysj.cfg.euw3.cache.amazonaws.com
  port: 11211

wordpressUsername: user
wordpressPassword: "${WORDPRESS_PASSWORD}"
wordpressEmail: user@example.com
wordpressBlogName: "My WordPress Blog"

# Ajoutez ces configurations si elles ne sont pas déjà présentes
replicaCount: 1

livenessProbe:
  httpGet:
    path: /wp-login.php
    port: http
  initialDelaySeconds: 120
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /wp-login.php
    port: http
  initialDelaySeconds: 120
  periodSeconds: 10

autoscaling:
  enabled: false

serviceAccount:
  create: true
  automount: true